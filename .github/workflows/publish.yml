name: Publish on 4pda

on:
  push:
    branches:
      - main
    paths:
      - '*.user.js'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Publish post on 4pda
        env:
          SIGNAL_SECRET: ${{ secrets.SIGNAL_SECRET }}
          FORUM: 5
          TOPIC: 1026245
        run: |
          chmod +x ./.github/publish.sh
          ./.github/publish.sh
        shell: bash
